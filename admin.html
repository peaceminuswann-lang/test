    <script>

        function checkLogin() {

        function parseCSV(csv) {
            const rows = [];
            let currentRow = [];
            let currentField = '';
            let insideQuotes = false;
            
            for (let i = 0; i < csv.length; i++) {
                const char = csv[i];
                const nextChar = csv[i + 1];
                
                if (char === '"') {
                    if (insideQuotes && nextChar === '"') {
                        currentField += '"';
                        i++;
                    } else {
                        insideQuotes = !insideQuotes;
                    }
                } else if (char === ',' && !insideQuotes) {
                    currentRow.push(currentField.trim());
                    currentField = '';
                } else if ((char === '\n' || char === '\r') && !insideQuotes) {
                    if (currentField.trim() || currentRow.length > 0) {
                        currentRow.push(currentField.trim());
                        if (currentRow.some(f => f)) {
                            rows.push(currentRow);
                        }
                        currentRow = [];
                        currentField = '';
                    }
                    if (char === '\r' && nextChar === '\n') i++;
                } else {
                    currentField += char;
                }
            }
            
            if (currentField.trim() || currentRow.length > 0) {
                currentRow.push(currentField.trim());
                if (currentRow.some(f => f)) {
                    rows.push(currentRow);
                }
            }
            
            if (rows.length < 2) return [];
            
            const headers = rows[0].map(h => h.trim());
            const data = [];
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length === 0 || !row.some(f => f)) continue;
                const obj = {};
                for (let j = 0; j < headers.length; j++) {
                    obj[headers[j]] = (row[j] || '').trim();
                }
                data.push(obj);
            }
            console.log('Parsed CSV - Headers:', headers);
            console.log('Parsed CSV - Sample row:', data[0]);
            console.log('Parsed CSV - Total rows:', data.length);
            return data;
        }

        async function processFile(fleetType) {
            const btn = document.getElementById(fleetType + 'Btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Uploading...';
            
            let file, month, year;
            if (fleetType === 'b737') {
                file = document.getElementById('b737File').files[0];
                month = document.getElementById('b737Month').value;
                year = document.getElementById('b737Year').value;
            } else if (fleetType === 'atr') {
                file = document.getElementById('atrFile').files[0];
                month = document.getElementById('atrMonth').value;
                year = document.getElementById('atrYear').value;
            }
            if (!file) {
                alert('Please select a file for ' + fleetType.toUpperCase());
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-upload me-2"></i>Upload ' + fleetType.toUpperCase() + ' Data';
                return;
            }
            const reader = new FileReader();
            reader.onload = async function(e) {
                let data = [];
                const fileName = file.name.toLowerCase();
                if (fileName.endsWith('.xlsx') || fileName.endsWith('.xls')) {
                    const workbook = XLSX.read(e.target.result, {type: 'binary'});
                    const sheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[sheetName];
                    data = XLSX.utils.sheet_to_json(worksheet);
                } else if (fileName.endsWith('.csv')) {
                    const csv = e.target.result;
                    // Proper CSV parser that handles quoted fields
                    data = parseCSV(csv);
                } else {
                    alert('Unsupported file format');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-upload me-2"></i>Upload ' + fleetType.toUpperCase() + ' Data';
                    return;
                }
                // Store data
                const key = fleetType + '_' + month + '_' + year;
                const success = await setFlightData(key, data);
                if (!success) {
                    alert('Failed to save data. Please try again.');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-upload me-2"></i>Upload ' + fleetType.toUpperCase() + ' Data';
                    return;
                }
                // Update available months
                let months = await getAvailableMonths();
                const monthKey = month + '_' + year;
                if (!months.includes(monthKey)) {
                    months.push(monthKey);
                    await setAvailableMonths(months);
                }
                alert(fleetType.toUpperCase() + ' data for ' + month + '/' + year + ' uploaded successfully!\n\nNote: Refresh the dashboard page to see the new data.');
                // Clear the input
                if (fleetType === 'b737') {
                    document.getElementById('b737File').value = '';
                } else {
                    document.getElementById('atrFile').value = '';
                }
                updateDataList();
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-upload me-2"></i>Upload ' + fleetType.toUpperCase() + ' Data';
            };
            if (file.name.toLowerCase().endsWith('.xlsx') || file.name.toLowerCase().endsWith('.xls')) {
                reader.readAsBinaryString(file);
            } else {
                reader.readAsText(file);
            }
        }

        async function updateDataList() {
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = '';
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            const allData = await getAllFlightData();
            Object.keys(allData).forEach(key => {
                if (key.startsWith('b737_') || key.startsWith('atr_')) {
                    const parts = key.split('_');
                    const fleet = parts[0];
                    const month = parts[1];
                    const year = parts[2];
                    const data = allData[key];
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${fleet === 'b737' ? 'B737' : 'ATR72'}</td>
                        <td>${monthNames[parseInt(month) - 1]}</td>
                        <td>${year}</td>
                        <td>${data.length}</td>
                        <td><button class="btn btn-danger btn-sm" onclick="deleteData('${key}')">Delete</button></td>
                    `;
                    tbody.appendChild(row);
                }
            });
        }

        async function deleteData(key) {
            if (confirm('Are you sure you want to delete this data?')) {
                try {
                    // Actually delete the document from Supabase
                    const { error } = await window.supabase
                        .from('flight_data')
                        .delete()
                        .eq('id', key);
                    
                    if (error) {
                        console.error('Error deleting data:', error);
                        alert('Error deleting data');
                        return;
                    }
                    
                    // Update available months
                    const parts = key.split('_');
                    const monthKey = parts[1] + '_' + parts[2];
                    let months = await getAvailableMonths();
                    // Check if any other data for this month
                    const allData = await getAllFlightData();
                    let hasOther = false;
                    Object.keys(allData).forEach(k => {
                        if (k !== key && k.includes('_' + monthKey)) {
                            hasOther = true;
                        }
                    });
                    if (!hasOther) {
                        months = months.filter(m => m !== monthKey);
                        await setAvailableMonths(months);
                    }
                    await updateDataList();
                    alert('Data deleted successfully!\n\nPlease refresh the Dashboard to see the updated data.');
                } catch (error) {
                    console.error('Error deleting data:', error);
                    alert('Error deleting data. Please try again.');
                }
            }
        }

        // Supabase functions
        async function setFlightData(key, data) {
            try {
                const { error } = await window.supabase
                    .from('flight_data')
                    .upsert([{ id: key, data: data }]);
                if (error) {
                    console.error('Error setting flight data:', error);
                    return false;
                }
                return true;
            } catch (error) {
                console.error('Error setting flight data:', error);
                return false;
            }
        }

        async function getAvailableMonths() {
            try {
                const { data, error } = await window.supabase
                    .from('available_months')
                    .select('months')
                    .eq('id', 'availableMonths')
                    .single();
                if (error) {
                    return [];
                }
                return data?.months || [];
            } catch (error) {
                console.error('Error getting available months:', error);
                return [];
            }
        }

        async function setAvailableMonths(months) {
            try {
                const { error } = await window.supabase
                    .from('available_months')
                    .upsert([{ id: 'availableMonths', months: months }]);
                if (error) {
                    console.error('Error setting available months:', error);
                    return false;
                }
                return true;
            } catch (error) {
                console.error('Error setting available months:', error);
                return false;
            }
        }

        async function getAllFlightData() {
            try {
                const { data, error } = await window.supabase
                    .from('flight_data')
                    .select('id, data');
                if (error) {
                    console.error('Error getting flight data:', error);
                    return {};
                }
                const result = {};
                data.forEach(row => {
                    if (Array.isArray(row.data) && row.data.length > 0) {
                        result[row.id] = row.data;
                    }
                });
                return result;
            } catch (error) {
                console.error('Error getting all flight data:', error);
                return {};
            }
        }
