<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis by Flight Operations, Technical & Development - Admin Login</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #ff8c00 0%, #ffca28 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 22px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.12);
            padding: 42px;
            max-width: 460px;
            width: 100%;
        }

        .login-icon {
            font-size: 4.2rem;
            color: #ff8c00;
            margin-bottom: 20px;
        }

        .btn-login {
            background: linear-gradient(135deg, #ff8c00 0%, #ff9f1a 100%);
            border: none;
            border-radius: 25px;
            padding: 14px 30px;
            color: white;
            font-weight: 600;
            width: 100%;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            color: white;
        }

        .login-footer {
            margin-top: 20px;
            text-align: center;
        }

        .login-footer a {
            color: #ff8c00;
            text-decoration: none;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        /* Responsive CSS for Login Page */
        @media (max-width: 768px) {
            .login-card {
                padding: 28px;
                border-radius: 18px;
                margin: 20px;
                max-width: 100%;
            }

            .login-icon {
                font-size: 3.2rem;
                margin-bottom: 15px;
            }

            .login-card h2 {
                font-size: 1.5rem;
                margin: 10px 0;
            }

            .login-card p {
                font-size: 0.9rem;
            }

            .form-label {
                font-size: 0.9rem;
                margin-bottom: 5px;
            }

            .form-control {
                font-size: 0.95rem;
                padding: 10px 12px;
            }

            .form-control::placeholder {
                font-size: 0.9rem;
            }

            .btn-login {
                padding: 12px 25px;
                font-size: 0.95rem;
            }

            .login-footer {
                margin-top: 20px;
            }

            .login-footer a {
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 20px;
                border-radius: 16px;
                margin: 15px;
                max-width: 100%;
            }

            .login-icon {
                font-size: 2.8rem;
                margin-bottom: 12px;
            }

            .login-card h2 {
                font-size: 1.25rem;
                margin: 8px 0;
            }

            .login-card p {
                font-size: 0.85rem;
                margin-bottom: 15px;
            }

            .mb-3 {
                margin-bottom: 12px !important;
            }

            .form-label {
                font-size: 0.8rem;
                margin-bottom: 4px;
            }

            .form-control {
                font-size: 0.9rem;
                padding: 8px 10px;
                border-radius: 6px;
            }

            .form-control::placeholder {
                font-size: 0.85rem;
            }

            .btn-login {
                padding: 10px 20px;
                font-size: 0.85rem;
                border-radius: 20px;
            }

            .btn-login i {
                font-size: 0.8rem;
            }

            .login-footer {
                margin-top: 15px;
            }

            .login-footer a {
                font-size: 0.8rem;
            }

            .login-footer a i {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center">
            <i class="fas fa-user-shield login-icon"></i>
            <h2 class="fw-bold">Admin Login</h2>
            <p class="text-muted">Enter your username and password to manage uploaded data.</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)" autocomplete="off">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" class="form-control" placeholder="Enter your username" autocomplete="off" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter your password" autocomplete="off" required>
            </div>
            <button type="submit" class="btn btn-login">
                <i class="fas fa-right-to-bracket me-2"></i>Login
            </button>
        </form>

        <div class="login-footer">
            <a href="index.html"><i class="fas fa-arrow-left me-2"></i>Back to Dashboard</a>
        </div>
    </div>

    <script>
        const ADMIN_USER = 'FYFOTD';
        const ADMIN_PASS = 'firefly@123';

        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (username === ADMIN_USER && password === ADMIN_PASS) {
                sessionStorage.setItem('adminLoggedIn', 'true');
                sessionStorage.setItem('adminLoginTime', new Date().getTime());
                window.location.href = 'admin.html';
            } else {
                alert('Invalid username or password');
            }
        }
    </script>
</body>
</html>
